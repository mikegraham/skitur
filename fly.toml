app = "skitur"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  SKITUR_DEM_CACHE = "/data/dem"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[[mounts]]
  source = "skitur_data"
  destination = "/data"
  initial_size = "25gb"
  snapshot_retention = 30
